name: Update Rayno Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 20 * * *'
    - cron: '0 1 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv
      - run: |
          if [ -f index.html ]; then
            cp index.html dashboard_report.html
          fi
      - name: Run update script
        run: python update_dashboard.py
        env:
          FINALE_USER: ${{ secrets.FINALE_USER }}
          FINALE_PASS: ${{ secrets.FINALE_PASS }}
      - run: cp dashboard_report.html index.html
      - run: |
          git config user.name "Rayno Bot"
          git config user.email "bot@raynofilm.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Auto-update dashboard"
          git push
